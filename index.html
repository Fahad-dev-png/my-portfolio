<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>فهد بن سعيد العسمري</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f9f9f9; text-align: center; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        .btn { display: block; width: 80%; margin: 15px auto; padding: 15px; text-decoration: none; border-radius: 50px; font-weight: bold; color: white; background: #d32f2f; }
        
        /* هنا نضع كود الـ 3D الجديد */
        img { 
            width: 100%; 
            border-radius: 10px; 
            margin: 15px 0;
            transition: transform 0.5s ease, box-shadow 0.5s ease;
            cursor: pointer;
        }
        img:hover {
            transform: perspective(1000px) rotateY(10deg) scale(1.05);
            box-shadow: 0 20px 30px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>موقع التوظيف السريع</h1>
        <p>وجهتك الأولى للفرص الوظيفية</p>
        
        <img src="pone.png" alt="صورة فريق">
        <a href="https://linktr.ee/jobscareerpositions" class="btn">أحدث الوظائف</a>
        
        <img src="ptwo.png" alt="صورة عمل">
        <p>نحن هنا للإجابة على تساؤلاتك</p>
        <a href="mailto:your-email@example.com" class="btn" style="background:#007bff;">تواصل معنا</a>
    </div>
</body>
</html>
