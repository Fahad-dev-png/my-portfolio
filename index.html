<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        .container {
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        .btn {
            display: block;
            width: 80%;
            margin: 15px auto;
            padding: 15px;
            text-decoration: none;
            border-radius: 5px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>موقع التوظيف السريع</h1>
        <p>وجهتك الأولى للفرص الوظيفية</p>

        <img src="pone.png" alt="صورة عمل">
        <a href="https://linktr.ee/jobscareerpositions" class="btn">أحدث الوظائف</a>

        <img src="ptwo.png" alt="صورة عمل">

        <div id="contact" style="margin-top: 30px; text-align: right;">
            <h2>تواصل معنا في حال واجهتك أي مشاكل</h2>
            <form action="https://formspree.io/f/mpqedjdd" method="POST">
                <input type="text" name="name" placeholder="الاسم" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
                <input type="email" name="email" placeholder="البريد الإلكتروني" required style="width: 100%; padding: 10px; margin-bottom: 10px;">
                <textarea name="message" placeholder="استفسارك" required style="width: 100%; padding: 10px; margin-bottom: 10px;"></textarea>
                <button type="submit" style="width: 100%; padding: 15px; background: #007bff; color: white; border: none; cursor: pointer;">إرسال</button>
            </form>

            <div style="margin-top: 30px;">
                <h3>من أنا؟ وش بفيدك فيه؟</h3>
                <p>في عالم التوظيف السريع والمتغير، لا يكفي أن تمتلك المهارات فحسب، بل يجب أن تعرف كيف تعرضها. أنا هنا لأكون شريكك في هذه الرحلة.</p>
            </div>

            <footer style="margin-top: 20px; font-size: 14px; color: #555; border-top: 1px solid #ddd; padding-top: 10px;">
                <p>&copy; 2026 Fahd Al-Asmari. جميع الحقوق محفوظة.</p>
            </footer>
        </div>
    </div>

</body>
</html>
